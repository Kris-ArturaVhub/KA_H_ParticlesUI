<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KAvnhub V8.1 - Fix Black Screen 🌌</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: monospace; display: flex; flex-direction: column; height: 100vh; }
        #top-panel { height: 45%; position: relative; border-bottom: 1px solid #333; background: #111; }
        #bottom-panel { height: 55%; position: relative; background: #000; }
        canvas { display: block; width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 2; }
        video { display: block; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); position: absolute; z-index: 1; }
        .hud { position: absolute; top: 10px; left: 10px; color: #0f0; font-size: 9px; z-index: 5; text-shadow: 0 0 5px #0f0; pointer-events: none; }
        #status-bar { position: absolute; bottom: 5px; width: 100%; text-align: center; color: #fff; font-size: 11px; font-weight: bold; z-index: 5; }
    </style>
</head>
<body>
    <div id="top-panel">
        <div class="hud">>> SYSTEM V8.1: ONLINE<br>>> FIX: SYNC RENDER</div>
        <video id="input_video" playsinline></video>
        <canvas id="canvas-top"></canvas>
    </div>
    <div id="bottom-panel">
        <div id="status-bar">CAMERA INITIALIZING...</div>
        <canvas id="canvas-bottom"></canvas>
    </div>

    <script>
        const video = document.getElementById('input_video');
        const cTop = document.getElementById('canvas-top'); const ctxTop = cTop.getContext('2d');
        const cBottom = document.getElementById('canvas-bottom'); const ctxBottom = cBottom.getContext('2d');
        const status = document.getElementById('status-bar');

        let PARTICLE_COUNT = 1000;
        let particles = [];
        let currentMode = 'free';
        let particleColor = "white";
        let handCenter = {x: 0, y: 0};
        let lastFaceRes = null, lastHandRes = null;

        function resize() {
            cTop.width = window.innerWidth; cTop.height = window.innerHeight * 0.45;
            cBottom.width = window.innerWidth; cBottom.height = window.innerHeight * 0.55;
            initPatterns();
        }

        let heartPoints = [], textPoints = [];
        function initPatterns() {
            const cx = cBottom.width / 2, cy = cBottom.height / 2;
            heartPoints = [];
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const t = (i / PARTICLE_COUNT) * Math.PI * 2;
                const r = 8; 
                heartPoints.push({
                    x: cx + r * (16 * Math.pow(Math.sin(t), 3)),
                    y: cy - r * (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) + 20
                });
            }
            // Tạo chữ KRIS nhanh
            textPoints = [];
            ctxBottom.fillStyle = "white"; ctxBottom.font = "bold 80px Arial"; ctxBottom.textAlign = "center";
            ctxBottom.fillText("KRIS", cx, cy + 30);
            const data = ctxBottom.getImageData(0,0,cBottom.width,cBottom.height).data;
            for(let y=0; y<cBottom.height; y+=6) {
                for(let x=0; x<cBottom.width; x+=6) {
                    if(data[(y*cBottom.width+x)*4+3] > 128) textPoints.push({x,y});
                }
            }
            ctxBottom.clearRect(0,0,cBottom.width,cBottom.height);
        }

        class Particle {
            constructor() { 
                this.x = Math.random()*window.innerWidth; this.y = Math.random()*window.innerHeight;
                this.vx = (Math.random()-0.5)*2; this.vy = (Math.random()-0.5)*2; this.size = Math.random()*2+0.5;
            }
            update(target) {
                if(currentMode === 'blackhole') {
                    let dx = handCenter.x - this.x; let dy = handCenter.y - this.y;
                    let dist = Math.sqrt(dx*dx + dy*dy) || 1;
                    this.vx += (dx/dist) * 0.6; this.vy += (dy/dist) * 0.6;
                    this.vx *= 0.92; this.vy *= 0.92;
                } else if((currentMode === 'pattern' || currentMode === 'text') && target) {
                    this.x += (target.x - this.x)*0.15; this.y += (target.y - this.y)*0.15;
                } else {
                    this.x += this.vx; this.y += this.vy;
                    if(this.x<0 || this.x>cBottom.width) this.vx *= -1;
                    if(this.y<0 || this.y>cBottom.height) this.vy *= -1;
                }
            }
            draw() { ctxBottom.fillStyle = particleColor; ctxBottom.fillRect(this.x, this.y, this.size, this.size); }
        }

        for(let i=0; i<PARTICLE_COUNT; i++) particles.push(new Particle());

        const faceMesh = new FaceMesh({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
        faceMesh.setOptions({maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5});
        faceMesh.onResults(res => lastFaceRes = res);

        const hands = new Hands({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
        hands.setOptions({maxNumHands: 1, modelComplexity: 0, minDetectionConfidence: 0.6});
        hands.onResults(res => lastHandRes = res);

        function drawLoop() {
            ctxTop.clearRect(0,0,cTop.width,cTop.height);
            ctxBottom.clearRect(0,0,cBottom.width,cBottom.height);

            // Xử lý Face
            if(lastFaceRes?.multiFaceLandmarks?.[0]) {
                const lm = lastFaceRes.multiFaceLandmarks[0];
                const EAR = (e) => (Math.abs(lm[e[1]].y-lm[e[5]].y) + Math.abs(lm[e[2]].y-lm[e[4]].y)) / (2*Math.abs(lm[e[0]].x-lm[e[3]].x));
                particleColor = (EAR([33,160,158,133,153,144]) > 0.12) ? "white" : "#ff00ff";
                ctxTop.strokeStyle = "#0f0"; ctxTop.strokeRect((1-lm[1].x)*cTop.width-30, lm[1].y*cTop.height-40, 60, 80);
            }

            // Xử lý Hands
            if(lastHandRes?.multiHandLandmarks?.[0]) {
                const hm = lastHandRes.multiHandLandmarks[0];
                const getX = (i) => (1-hm[i].x)*cTop.width; 
                const getY = (i) => hm[i].y*cTop.height;
                
                ctxTop.strokeStyle = "#00ffff";
                [4, 8, 12, 16, 20].forEach(i => ctxTop.strokeRect(getX(i)-8, getY(i)-8, 16, 16));
                ctxTop.strokeRect(getX(0)-25, getY(0)-25, 50, 50);

                handCenter = {x: (1-hm[9].x) * cBottom.width, y: hm[9].y * cBottom.height};
                const up = (i) => hm[i*4+4].y < hm[i*4+2].y;
                const fingers = [up(0), up(1), up(2), up(3), up(4)];
                
                if(fingers[1] && fingers[4] && !fingers[2]) currentMode = 'blackhole';
                else if(fingers[1] && fingers[2] && !fingers[3]) currentMode = 'pattern';
                else if(!fingers[1] && !fingers[2]) currentMode = 'text';
                else currentMode = 'free';
            } else { currentMode = 'free'; }

            status.innerText = `MODE: ${currentMode.toUpperCase()}`;
            particles.forEach((p, i) => {
                let target = (currentMode === 'text') ? textPoints[i % textPoints.length] : heartPoints[i];
                p.update(target); p.draw();
            });
            requestAnimationFrame(drawLoop);
        }

        const camera = new Camera(video, {
            onFrame: async () => {
                await faceMesh.send({image: video});
                await hands.send({image: video});
            }, width: 640, height: 480
        });

        camera.start().then(() => {
            status.innerText = "SYSTEM READY";
            drawLoop();
        });

        window.addEventListener('resize', resize); resize();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAvnhub Particle V5 - God Mode 🌌</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        #container { width: 100vw; height: 100vh; position: relative; }
        canvas { display: block; width: 100%; height: 100%; }
        video { display: none; }
        #hud { position: absolute; top: 20px; left: 20px; color: #0f0; font-size: 10px; line-height: 1.4; text-shadow: 0 0 5px #0f0; z-index: 10; }
        #status-msg { position: absolute; bottom: 40px; width: 100%; text-align: center; color: #fff; font-weight: bold; font-size: 20px; letter-spacing: 3px; text-shadow: 0 0 15px #ff69b4; z-index: 10; }
    </style>
</head>
<body>
    <div id="container">
        <div id="hud">>> SYSTEM: V5_ULTRA<br>>> SENSOR: HIGH_SENSITIVITY<br>>> GESTURE: <span id="mode-text">IDLE</span></div>
        <div id="status-msg">WAITING FOR COMMAND...</div>
        <canvas id="canvas"></canvas>
    </div>
    <video id="input_video"></video>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const modeText = document.getElementById('mode-text');
        const statusMsg = document.getElementById('status-msg');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // --- CÀI ĐẶT CỦA ANH (ANH SỬA Ở ĐÂY NHEN) ---
        const TEXT_TO_SHOW = "KRIS"; // Anh muốn đổi chữ thì sửa ở đây nha!
        const PARTICLE_COUNT = 1500;
        const particles = [];
        let currentMode = 'free'; 

        // --- TẠO HÌNH MẪU (HEART & TEXT) ---
        let heartPoints = [];
        let textPoints = [];

        function initPatterns() {
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            
            // 1. Tạo hình Trái tim ❤️ (✌️)
            heartPoints = [];
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const t = (i / PARTICLE_COUNT) * Math.PI * 2;
                const r = 13;
                const px = cx + r * (16 * Math.pow(Math.sin(t), 3));
                const py = cy - r * (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
                heartPoints.push({x: px, y: py});
            }

            // 2. Tạo hình Chữ ✊
            textPoints = [];
            ctx.fillStyle = "white";
            ctx.font = "bold 150px Arial";
            ctx.textAlign = "center";
            ctx.fillText(TEXT_TO_SHOW, cx, cy + 50);
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            const pixelPoints = [];
            for (let y = 0; y < canvas.height; y += 4) {
                for (let x = 0; x < canvas.width; x += 4) {
                    if (imageData[(y * canvas.width + x) * 4 + 3] > 128) {
                        pixelPoints.push({x: x, y: y});
                    }
                }
            }
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                textPoints.push(pixelPoints[i % pixelPoints.length]);
            }
        }
        initPatterns();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 10;
                this.vy = (Math.random() - 0.5) * 10;
                this.friction = 0.92;
                this.ease = 0.25; // Tốc độ xếp hình (0.25 là cực nhanh)
                this.size = Math.random() * 2 + 0.5;
            }

            update(target) {
                if (currentMode === 'pattern' || currentMode === 'text') {
                    this.x += (target.x - this.x) * this.ease;
                    this.y += (target.y - this.y) * this.ease;
                } else if (currentMode === 'rain') {
                    this.vy += 0.8; // Trọng lực mạnh cho mưa nhanh
                    this.y += this.vy;
                    if (this.y > canvas.height) { this.y = -20; this.vy = Math.random() * 5 + 5; }
                } else if (currentMode === 'freeze') {
                    return;
                } else {
                    // Chế độ tự do + Lực bùng nổ khi vừa thả tay
                    this.x += this.vx; this.y += this.vy;
                    this.vx *= this.friction; this.vy *= this.friction;
                    if (Math.abs(this.vx) < 0.1) this.vx = (Math.random()-0.5)*1.5;
                    if (Math.abs(this.vy) < 0.1) this.vy = (Math.random()-0.5)*1.5;
                }
            }

            explode() {
                const angle = Math.random() * Math.PI * 2;
                const force = Math.random() * 15 + 5;
                this.vx = Math.cos(angle) * force;
                this.vy = Math.sin(angle) * force;
            }

            draw() {
                ctx.fillStyle = "white";
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
            }
        }

        for (let i = 0; i < PARTICLE_COUNT; i++) particles.push(new Particle());

        function onResults(results) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let prevMode = currentMode;
            
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const lm = results.multiHandLandmarks[0];
                const up = (i) => lm[i*4+4].y < lm[i*4+2].y; // Check ngón tay mở
                const fingers = [up(0), up(1), up(2), up(3), up(4)]; // [Cái, Trỏ, Giữa, Nhẫn, Út]

                if (fingers[1] && !fingers[2] && !fingers[3] && !fingers[4]) currentMode = 'rain'; // ☝️
                else if (fingers[1] && fingers[2] && !fingers[3] && !fingers[4]) currentMode = 'pattern'; // ✌️ -> ❤️
                else if (!fingers[1] && !fingers[2] && !fingers[3] && !fingers[4]) currentMode = 'text'; // ✊ -> KRIS
                else if (fingers[1] && fingers[2] && fingers[3] && fingers[4]) currentMode = 'freeze'; // 🖐️
                else currentMode = 'free';
            } else { currentMode = 'free'; }

            // Nếu vừa thoát từ mode xếp hình sang free -> BÙNG NỔ!
            if ((prevMode === 'pattern' || prevMode === 'text') && currentMode === 'free') {
                particles.forEach(p => p.explode());
            }

            modeText.innerText = currentMode.toUpperCase();
            statusMsg.innerText = currentMode === 'pattern' ? "❤️ HEART LOCKED" : (currentMode === 'text' ? `✊ ${TEXT_TO_SHOW} MODE` : "SYSTEM ACTIVE");

            particles.forEach((p, i) => {
                let target = currentMode === 'text' ? textPoints[i] : heartPoints[i];
                p.update(target); p.draw();
            });
        }

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.6 });
        hands.onResults(onResults);

        const camera = new Camera(document.getElementById('input_video'), {
            onFrame: async () => { await hands.send({image: document.getElementById('input_video')}); },
            width: 640, height: 480
        });
        camera.start();

        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; initPatterns(); });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAvnhub Particle Gesture ✨</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; background: black; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        /* Khung đen chính của anh nà */
        #container { width: 95vw; height: 90vh; position: relative; border: 2px solid #333; border-radius: 20px; box-shadow: 0 0 20px rgba(255,105,180,0.1); }
        /* Khu vực hiển thị các hạt (Canvas) */
        canvas { display: block; width: 100%; height: 100%; }
        /* Camera ẩn bên dưới */
        video { display: none; }
        /* Dòng trạng thái cho pro */
        #status { position: absolute; top: 10px; left: 10px; color: #ff69b4; font-family: sans-serif; font-weight: bold; font-size: 14px; background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 10px; z-index: 10; }
    </style>
</head>
<body>
    <div id="container">
        <div id="status">👋 Đang chờ anh vẫy tay...</div>
        <canvas id="particle_canvas"></canvas>
    </div>
    <video id="input_video"></video>

    <script>
        const container = document.getElementById('container');
        const canvas = document.getElementById('particle_canvas');
        const ctx = canvas.getContext('2d');
        const statusText = document.getElementById('status');

        // Khởi tạo Canvas cho khớp với khung đen
        canvas.width = container.clientWidth;
        canvas.height = container.clientHeight;

        // --- HỆ THỐNG HẠT (PARTICLE SYSTEM) ---
        const PARTICLE_COUNT = 800; // Số lượng hạt lơ lửng
        const particles = [];

        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.originX = this.x; // Vị trí tự do ban đầu
                this.originY = this.y;
                this.targetX = this.x; // Vị trí mẫu khi có cử chỉ
                this.targetY = this.y;
                this.size = Math.random() * 2 + 0.5; // Hạt siêu nhỏ màu trắng
                this.speedX = Math.random() * 1.5 - 0.75; // Tự do lơ lửng
                this.speedY = Math.random() * 1.5 - 0.75;
                this.mode = "free"; // free hoặc pattern
            }
            update() {
                if (this.mode === "free") { // Chế độ tự do
                    this.x += this.speedX; this.y += this.speedY;
                    if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
                    if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
                } else if (this.mode === "pattern") { // Chế độ sắp xếp
                    this.x += (this.targetX - this.x) * 0.1;
                    this.y += (this.targetY - this.y) * 0.1;
                }
            }
            draw() {
                ctx.fillStyle = "white"; // Hạt màu trắng
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
            }
        }
        for (let i = 0; i < PARTICLE_COUNT; i++) { particles.push(new Particle()); }

        // --- ĐỊNH NGHĨA HÌNH MẪU (PATTERN DEFINITIONS) ---
        // Hàm này sẽ sắp xếp các hạt theo hình dạng mong muốn
        function setParticlePattern(landmarks) {
            if (!landmarks) return;
            const wrist = landmarks[0]; // Điểm cổ tay làm mốc
            const thumb = landmarks[4]; // Ngón cái
            const index = landmarks[8]; // Ngón trỏ

            // 1. Kiểm tra cử chỉ: Nếu khoảng cách ngón cái và ngón trỏ hẹp (✌️)
            const distance = Math.sqrt(Math.pow(thumb.x - index.x, 2) + Math.pow(thumb.y - index.y, 2));
            if (distance > 0.15) { // Dấu hiệu xòe tay (mô phỏng, anh có thể sửa lại cho ✌️)
                statusText.innerText = "(✌️ Cử chỉ: Sắp xếp hình mẫu!)";
                statusText.style.color = "#00bfff";
                for (let i = 0; i < particles.length; i++) {
                    // Sắp xếp các hạt theo hình vầng trăng (mô phỏng cho dễ)
                    const angle = (i / particles.length) * Math.PI;
                    const radius = canvas.width / 4;
                    particles[i].targetX = canvas.width / 2 + Math.cos(angle) * radius;
                    particles[i].targetY = canvas.height / 2 + Math.sin(angle) * radius;
                    particles[i].mode = "pattern";
                }
            } else {
                return false; // Hông có cử chỉ
            }
            return true;
        }

        // --- NHẬN DIỆN CỬ CHỈ (MEDIA PIPE) ---
        function onResults(results) {
            ctx.clearRect(0, 0, canvas.width, canvas.height); // Xóa Canvas cũ

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                // Có nhận diện tay
                const isPatternSet = setParticlePattern(results.multiHandLandmarks[0]);
                if (!isPatternSet) {
                    // Nếu hông khớp mẫu nào, bung ra tự do
                    if (particles[0].mode === "pattern") {
                        statusText.innerText = "👋 Đã thả tay! Bung ra nà~";
                        statusText.style.color = "#ff69b4";
                        setTimeout(() => { statusText.innerText = "👋 Đang chờ anh vẫy tay..."; statusText.style.color = "#ff69b4"; }, 1000);
                    }
                    for (let p of particles) p.mode = "free";
                }
            } else {
                // Hông nhận diện tay, bung ra tự do
                if (particles[0].mode === "pattern") {
                    statusText.innerText = "👋 Hông thấy tay! Bung ra nà~";
                    statusText.style.color = "#ff69b4";
                    setTimeout(() => { statusText.innerText = "👋 Đang chờ anh vẫy tay..."; statusText.style.color = "#ff69b4"; }, 1000);
                }
                for (let p of particles) p.mode = "free";
            }
            for (let p of particles) { p.update(); p.draw(); }
        }

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7 });
        hands.onResults(onResults);

        const camera = new Camera(document.getElementById('input_video'), {
            onFrame: async () => { await hands.send({image: document.getElementById('input_video')}); },
            width: 480, height: 480
        });
        camera.start();
    </script>
</body>
  </html>

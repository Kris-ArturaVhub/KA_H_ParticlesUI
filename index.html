<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAvnhub V8.5 - Enterprise Radar 🛰️</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        :root { --neon-green: #0f0; --neon-blue: #0ff; --matrix-bg: #000; }
        body { margin: 0; background: var(--matrix-bg); overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* Layout Panels */
        #main-container { display: flex; flex-direction: column; height: 100vh; width: 100vw; }
        #top-panel { height: 45%; position: relative; border-bottom: 2px solid #222; overflow: hidden; }
        #bottom-panel { height: 55%; position: relative; background: radial-gradient(circle, #0a0a0a 0%, #000 100%); }
        
        /* Video & Canvas Layers */
        video { position: absolute; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); z-index: 1; opacity: 0.6; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; pointer-events: none; }
        
        /* Cyber HUD UI */
        .hud-overlay { position: absolute; top: 15px; left: 15px; color: var(--neon-green); font-family: monospace; font-size: 11px; z-index: 10; text-shadow: 0 0 8px rgba(0,255,0,0.6); line-height: 1.5; }
        #status-bar { position: absolute; bottom: 15px; left: 0; width: 100%; text-align: center; color: #fff; font-family: monospace; font-size: 12px; z-index: 10; letter-spacing: 3px; font-weight: bold; }
        .loading-screen { position: absolute; inset: 0; background: #000; display: flex; justify-content: center; align-items: center; color: var(--neon-green); z-index: 100; transition: opacity 0.5s; }
    </style>
</head>
<body>
    <div id="loading" class="loading-screen">SYSTEM BOOTING... [PLEASE WAIT]</div>
    
    <div id="main-container">
        <div id="top-panel">
            <div class="hud-overlay">
                [ ANALYSIS SYSTEM V8.5 ]<br>
                > BIOMETRIC SCAN: ON<br>
                > PARTICLE ENGINE: V4.0<br>
                > LATENCY: <span id="ping">0</span>ms
            </div>
            <video id="input_video" playsinline></video>
            <canvas id="canvas-top"></canvas>
        </div>
        
        <div id="bottom-panel">
            <div id="status-bar">WAITING FOR SENSOR INPUT...</div>
            <canvas id="canvas-bottom"></canvas>
        </div>
    </div>

    <script>
        /** * GLOBAL CONFIGURATION & STATE
         */
        const config = {
            particleCount: 1000,
            heartSize: 9,
            earThreshold: 0.12,
            colors: { normal: "white", blink: "#ff00ff", radar: "#00ffff" }
        };

        const state = {
            mode: 'free',
            color: config.colors.normal,
            handPos: { x: 0, y: 0 },
            isReady: false,
            lastFrameTime: 0
        };

        const dom = {
            video: document.getElementById('input_video'),
            cTop: document.getElementById('canvas-top'),
            ctxTop: document.getElementById('canvas-top').getContext('2d'),
            cBottom: document.getElementById('canvas-bottom'),
            ctxBottom: document.getElementById('canvas-bottom').getContext('2d'),
            status: document.getElementById('status-bar'),
            ping: document.getElementById('ping'),
            loading: document.getElementById('loading')
        };

        let heartPoints = [];
        let particles = [];

        /**
         * INITIALIZATION LOGIC
         */
        function initSystem() {
            dom.cTop.width = window.innerWidth;
            dom.cTop.height = window.innerHeight * 0.45;
            dom.cBottom.width = window.innerWidth;
            dom.cBottom.height = window.innerHeight * 0.55;

            const cx = dom.cBottom.width / 2;
            const cy = dom.cBottom.height / 2;

            // Generate Heart Shape Target Points
            heartPoints = [];
            for (let i = 0; i < config.particleCount; i++) {
                const t = (i / config.particleCount) * Math.PI * 2;
                const r = config.heartSize;
                heartPoints.push({
                    x: cx + r * (16 * Math.pow(Math.sin(t), 3)),
                    y: cy - r * (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) + 25
                });

                // Initialize Particles if not exist
                if (!particles[i]) {
                    particles[i] = {
                        x: Math.random() * dom.cBottom.width,
                        y: Math.random() * dom.cBottom.height,
                        vx: 0, vy: 0,
                        size: Math.random() * 2 + 1
                    };
                }
            }
        }

        /**
         * MATH UTILITIES
         */
        const calcDist = (p1, p2) => Math.sqrt(Math.pow(p1.x - p2.x, 2) + Math.pow(p1.y - p2.y, 2));

        /**
         * CORE AI HANDLERS
         */
        function handleFaceResults(results) {
            if (!results.multiFaceLandmarks?.[0]) return;
            const lm = results.multiFaceLandmarks[0];
            
            // Draw Face Radar Box
            const fx = (1 - lm[1].x) * dom.cTop.width;
            const fy = lm[1].y * dom.cTop.height;
            
            dom.ctxTop.strokeStyle = config.colors.normal;
            dom.ctxTop.lineWidth = 2;
            dom.ctxTop.strokeRect(fx - 75, fy - 100, 150, 200);

            // EAR Blink Detection (Logic 0.12)
            const leftEAR = (calcDist(lm[159], lm[154]) + calcDist(lm[158], lm[145])) / (2 * calcDist(lm[33], lm[133]));
            state.color = leftEAR > config.earThreshold ? config.colors.normal : config.colors.blink;
        }

        function handleHandResults(results) {
            if (!results.multiHandLandmarks?.[0]) {
                state.mode = 'free';
                return;
            }
            const hm = results.multiHandLandmarks[0];
            
            // Draw 6-Axis Hand Radar
            dom.ctxTop.strokeStyle = config.colors.radar;
            dom.ctxTop.lineWidth = 1;
            [4, 8, 12, 16, 20].forEach(idx => {
                const hx = (1 - hm[idx].x) * dom.cTop.width;
                const hy = hm[idx].y * dom.cTop.height;
                dom.ctxTop.strokeRect(hx - 12, hy - 12, 24, 24);
            });
            const wristX = (1 - hm[0].x) * dom.cTop.width;
            const wristY = hm[0].y * dom.cTop.height;
            dom.ctxTop.strokeRect(wristX - 35, wristY - 35, 70, 70);

            // Gesture Recognition
            state.handPos = { x: (1 - hm[9].x) * dom.cBottom.width, y: hm[9].y * dom.cBottom.height };
            const isFingerUp = (f) => hm[f * 4 + 4].y < hm[f * 4 + 2].y;
            
            if (isFingerUp(1) && isFingerUp(4) && !isFingerUp(2) && !isFingerUp(3)) {
                state.mode = 'blackhole'; // 🤘
            } else if (isFingerUp(1) && isFingerUp(2) && !isFingerUp(3)) {
                state.mode = 'heart'; // ✌️
            } else if (!isFingerUp(1) && !isFingerUp(2)) {
                state.mode = 'freeze'; // ✊
            } else {
                state.mode = 'free';
            }
        }

        /**
         * MAIN ANIMATION ENGINE
         */
        function animate(now) {
            // Calculate FPS/Ping
            dom.ping.innerText = Math.floor(now - state.lastFrameTime);
            state.lastFrameTime = now;

            dom.ctxTop.clearRect(0, 0, dom.cTop.width, dom.cTop.height);
            dom.ctxBottom.clearRect(0, 0, dom.cBottom.width, dom.cBottom.height);

            // Particle Physics
            particles.forEach((p, i) => {
                if (state.mode === 'blackhole') {
                    const dx = state.handPos.x - p.x;
                    const dy = state.handPos.y - p.y;
                    const d = Math.sqrt(dx*dx + dy*dy) || 1;
                    p.vx += (dx / d) * 0.85;
                    p.vy += (dy / d) * 0.85;
                    p.vx *= 0.92; p.vy *= 0.92;
                } else if (state.mode === 'heart') {
                    p.x += (heartPoints[i].x - p.x) * 0.22;
                    p.y += (heartPoints[i].y - p.y) * 0.22;
                    p.vx = 0; p.vy = 0;
                } else if (state.mode === 'freeze') {
                    p.vx *= 0.8; p.vy *= 0.8;
                } else {
                    p.vx += (Math.random() - 0.5) * 0.5;
                    p.vy += (Math.random() - 0.5) * 0.5;
                    p.vx *= 0.98; p.vy *= 0.98;
                }

                p.x += p.vx; p.y += p.vy;
                
                // Draw Particle
                dom.ctxBottom.fillStyle = state.color;
                dom.ctxBottom.fillRect(p.x, p.y, p.size, p.size);
            });

            dom.status.innerText = `>> SYSTEM STATUS: ONLINE | MODE: ${state.mode.toUpperCase()}`;
            requestAnimationFrame(animate);
        }

        /**
         * CAMERA & AI BOOTSTRAP
         */
        async function start() {
            const faceMesh = new FaceMesh({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
            faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: false, minDetectionConfidence: 0.5 });
            faceMesh.onResults(handleFaceResults);

            const hands = new Hands({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
            hands.setOptions({ maxNumHands: 1, modelComplexity: 0, minDetectionConfidence: 0.5 });
            hands.onResults(handleHandResults);

            const camera = new Camera(dom.video, {
                onFrame: async () => {
                    await faceMesh.send({ image: dom.video });
                    await hands.send({ image: dom.video });
                },
                width: 640, height: 480
            });

            await camera.start();
            dom.loading.style.opacity = '0';
            setTimeout(() => dom.loading.style.display = 'none', 500);
            initSystem();
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', initSystem);
        start();
    </script>
</body>
</html>

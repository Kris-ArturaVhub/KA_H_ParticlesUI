<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KAvnhub V8.2 - Turbo Pro 🏎️</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: monospace; display: flex; flex-direction: column; height: 100vh; }
        #top-panel { height: 45%; position: relative; border-bottom: 1px solid #333; background: #050505; }
        #bottom-panel { height: 55%; position: relative; background: #000; }
        canvas { display: block; width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 2; pointer-events: none; }
        video { display: block; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); position: absolute; z-index: 1; }
        #status-bar { position: absolute; bottom: 10px; width: 100%; text-align: center; color: #0f0; font-size: 12px; z-index: 5; text-shadow: 0 0 5px #000; }
    </style>
</head>
<body>
    <div id="top-panel">
        <video id="input_video" playsinline></video>
        <canvas id="canvas-top"></canvas>
    </div>
    <div id="bottom-panel">
        <div id="status-bar">🚀 SYSTEM STARTING...</div>
        <canvas id="canvas-bottom"></canvas>
    </div>

    <script>
        const video = document.getElementById('input_video');
        const cTop = document.getElementById('canvas-top'); const ctxTop = cTop.getContext('2d');
        const cBottom = document.getElementById('canvas-bottom'); const ctxBottom = cBottom.getContext('2d');
        const status = document.getElementById('status-bar');

        let particles = [];
        let currentMode = 'free';
        let particleColor = "white";
        let handCenter = {x: 0, y: 0};
        let lastFace = null, lastHand = null;

        function resize() {
            cTop.width = window.innerWidth; cTop.height = window.innerHeight * 0.45;
            cBottom.width = window.innerWidth; cBottom.height = window.innerHeight * 0.55;
            initParticles();
        }

        // Tạo sẵn tọa độ Heart & Text để tiết kiệm CPU
        let heartPoints = [], textPoints = [];
        function initParticles() {
            const cx = cBottom.width / 2, cy = cBottom.height / 2;
            heartPoints = [];
            for (let i = 0; i < 1000; i++) {
                const t = (i / 1000) * Math.PI * 2;
                const r = 9; // Size 60%
                heartPoints.push({
                    x: cx + r * (16 * Math.pow(Math.sin(t), 3)),
                    y: cy - r * (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) + 20
                });
                particles[i] = particles[i] || { x: Math.random()*cBottom.width, y: Math.random()*cBottom.height, vx: 0, vy: 0 };
            }
        }

        const faceMesh = new FaceMesh({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
        faceMesh.setOptions({maxNumFaces: 1, refineLandmarks: false, minDetectionConfidence: 0.5});
        faceMesh.onResults(res => lastFace = res);

        const hands = new Hands({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
        hands.setOptions({maxNumHands: 1, modelComplexity: 0, minDetectionConfidence: 0.5});
        hands.onResults(res => lastHand = res);

        function draw() {
            ctxTop.clearRect(0,0,cTop.width,cTop.height);
            ctxBottom.clearRect(0,0,cBottom.width,cBottom.height);

            // 1. Vẽ Radar Mặt (Khung to)
            if(lastFace?.multiFaceLandmarks?.[0]) {
                const lm = lastFace.multiFaceLandmarks[0];
                const x = (1 - lm[1].x) * cTop.width;
                const y = lm[1].y * cTop.height;
                ctxTop.strokeStyle = "#0f0"; ctxTop.lineWidth = 2;
                ctxTop.strokeRect(x - 60, y - 80, 120, 160); // Khung to bao cả mặt
                
                // Mắt nhạy 0.12
                const dist = (p1, p2) => Math.sqrt(Math.pow(lm[p1].x-lm[p2].x, 2) + Math.pow(lm[p1].y-lm[p2].y, 2));
                const ear = (dist(159,154) + dist(158,145)) / (2 * dist(33,133));
                particleColor = ear > 0.12 ? "white" : "#ff00ff";
            }

            // 2. Vẽ Radar Tay (6 khung) & Cử chỉ
            if(lastHand?.multiHandLandmarks?.[0]) {
                const hm = lastHand.multiHandLandmarks[0];
                ctxTop.strokeStyle = "#00ffff"; ctxTop.lineWidth = 1;
                [4, 8, 12, 16, 20].forEach(i => {
                    ctxTop.strokeRect((1-hm[i].x)*cTop.width - 10, hm[i].y*cTop.height - 10, 20, 20);
                });
                ctxTop.strokeRect((1-hm[0].x)*cTop.width - 30, hm[0].y*cTop.height - 30, 60, 60);

                handCenter = { x: (1-hm[9].x)*cBottom.width, y: hm[9].y*cBottom.height };
                
                const up = (i) => hm[i*4+4].y < hm[i*4+2].y;
                if (up(1) && up(4) && !up(2) && !up(3)) currentMode = 'blackhole'; // 🤘
                else if (up(1) && up(2) && !up(3)) currentMode = 'heart'; // ✌️
                else if (!up(1) && !up(2)) currentMode = 'freeze'; // ✊
                else currentMode = 'free';
            } else { currentMode = 'free'; }

            // 3. Xử lý Hạt
            particles.forEach((p, i) => {
                if(currentMode === 'blackhole') {
                    let dx = handCenter.x - p.x; let dy = handCenter.y - p.y;
                    let d = Math.sqrt(dx*dx + dy*dy) || 1;
                    p.vx += (dx/d)*0.5; p.vy += (dy/d)*0.5;
                    p.vx *= 0.9; p.vy *= 0.9;
                } else if(currentMode === 'heart') {
                    p.x += (heartPoints[i].x - p.x)*0.2; p.y += (heartPoints[i].y - p.y)*0.2;
                } else if(currentMode === 'free') {
                    p.x += (Math.random()-0.5)*2; p.y += (Math.random()-0.5)*2;
                }
                ctxBottom.fillStyle = particleColor;
                ctxBottom.fillRect(p.x, p.y, 1.5, 1.5);
                p.x += p.vx; p.y += p.vy;
            });

            status.innerText = `MODE: ${currentMode.toUpperCase()}`;
            requestAnimationFrame(draw);
        }

        const camera = new Camera(video, {
            onFrame: async () => {
                await Promise.all([faceMesh.send({image: video}), hands.send({image: video})]);
            }, width: 640, height: 480
        });
        camera.start().then(() => { resize(); draw(); });
        window.onresize = resize;
    </script>
</body>
</html>

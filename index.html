<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAvnhub Particle God Mode 🌌</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', Courier, monospace; }
        #container { width: 100vw; height: 100vh; position: relative; }
        canvas { display: block; width: 100%; height: 100%; }
        video { display: none; }
        /* HUD hiển thị trạng thái cực ngầu cho anh nà */
        #hud {
            position: absolute; top: 20px; left: 20px; color: #0f0; 
            font-size: 12px; line-height: 1.5; pointer-events: none;
            text-shadow: 0 0 5px #0f0;
        }
        #status-msg {
            position: absolute; bottom: 40px; width: 100%; text-align: center;
            color: #fff; font-weight: bold; font-size: 18px; letter-spacing: 2px;
            text-shadow: 0 0 10px #ff69b4;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="hud">
            >> SYSTEM: ONLINE<br>
            >> SENSOR: ACTIVE<br>
            >> MODE: <span id="mode-text">IDLE</span>
        </div>
        <div id="status-msg">WAITING FOR COMMAND...</div>
        <canvas id="canvas"></canvas>
    </div>
    <video id="input_video"></video>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const modeText = document.getElementById('mode-text');
        const statusMsg = document.getElementById('status-msg');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const particles = [];
        const particleCount = 1200; // Tăng lên tí cho đẹp mắt nhen anh
        let currentMode = 'free'; // free, pattern, rain, freeze

        // --- TẠO HÌNH MẪU CHỮ V (✌️) ---
        const vPoints = [];
        function initPatterns() {
            vPoints.length = 0;
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            for (let i = 0; i < particleCount; i++) {
                let px, py;
                if (i < particleCount / 2) {
                    px = cx - 60 + (i / (particleCount/2)) * 60;
                    py = cy + 100 - (i / (particleCount/2)) * 200;
                } else {
                    let j = i - particleCount/2;
                    px = cx + (j / (particleCount/2)) * 60;
                    py = cy - 100 + (j / (particleCount/2)) * 200;
                }
                vPoints.push({x: px, y: py});
            }
        }
        initPatterns();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.baseVx = Math.random() * 2 - 1;
                this.baseVy = Math.random() * 2 - 1;
                this.vx = this.baseVx;
                this.vy = this.baseVy;
                this.size = Math.random() * 1.5 + 0.5;
            }

            update(target) {
                if (currentMode === 'pattern') {
                    // Xếp hình nhanh trong 0.8s
                    this.x += (target.x - this.x) * 0.2;
                    this.y += (target.y - this.y) * 0.2;
                } 
                else if (currentMode === 'rain') {
                    // Rơi như mưa
                    this.vy += 0.2; // Trọng lực
                    this.y += this.vy;
                    this.x += this.vx * 0.5;
                    if (this.y > canvas.height) {
                        this.y = -10;
                        this.vy = Math.random() * 2 + 2;
                    }
                }
                else if (currentMode === 'freeze') {
                    // Ngưng đọng thời gian - Đứng im re luôn
                    return;
                }
                else {
                    // Bay tự do lơ lửng
                    this.x += this.baseVx * 0.5;
                    this.y += this.baseVy * 0.5;
                    if (this.x < 0 || this.x > canvas.width) this.baseVx *= -1;
                    if (this.y < 0 || this.y > canvas.height) this.baseVy *= -1;
                }
            }

            draw() {
                ctx.fillStyle = "white";
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < particleCount; i++) particles.push(new Particle());

        function onResults(results) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const lm = results.multiHandLandmarks[0];
                
                // KIỂM TRA CÁC NGÓN TAY (Gập hay Mở)
                const isIndexUp = lm[8].y < lm[6].y;
                const isMiddleUp = lm[12].y < lm[10].y;
                const isRingUp = lm[16].y < lm[14].y;
                const isPinkyUp = lm[20].y < lm[18].y;

                // 1. Chỉ 1 ngón trỏ (☝️) -> MƯA RƠI
                if (isIndexUp && !isMiddleUp && !isRingUp && !isPinkyUp) {
                    currentMode = 'rain';
                    modeText.innerText = "RAIN_MODE";
                    statusMsg.innerText = "🌨️ PARTICLE RAIN ACTIVE";
                }
                // 2. Hai ngón (✌️) -> XẾP HÌNH
                else if (isIndexUp && isMiddleUp && !isRingUp && !isPinkyUp) {
                    currentMode = 'pattern';
                    modeText.innerText = "PATTERN_MODE";
                    statusMsg.innerText = "✌️ PATTERN LOCKED (0.8s)";
                }
                // 3. Năm ngón (🖐️) -> ĐỨNG IM (FREEZE)
                else if (isIndexUp && isMiddleUp && isRingUp && isPinkyUp) {
                    currentMode = 'freeze';
                    modeText.innerText = "TIME_STOP";
                    statusMsg.innerText = "❄️ TIME HAS FROZEN";
                }
                else {
                    currentMode = 'free';
                    modeText.innerText = "SCANNING";
                    statusMsg.innerText = "WAITING FOR GESTURE...";
                }
            } else {
                currentMode = 'free';
                modeText.innerText = "IDLE";
                statusMsg.innerText = "NO HAND DETECTED";
            }

            particles.forEach((p, i) => {
                p.update(vPoints[i]);
                p.draw();
            });
        }

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 1, modelComplexity: 0, minDetectionConfidence: 0.5 });
        hands.onResults(onResults);

        const camera = new Camera(document.getElementById('input_video'), {
            onFrame: async () => { await hands.send({image: document.getElementById('input_video')}); },
            width: 640, height: 480
        });
        camera.start();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            initPatterns();
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAvnhub Particle Matrix V2 🌌</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; background: #050505; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #container { 
            width: 100vw; height: 100vh; position: relative; 
            display: flex; justify-content: center; align-items: center;
        }
        /* Khung đen chính - Border neon nhẹ */
        #frame {
            width: 90%; height: 85%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            position: relative;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            box-shadow: 0 0 50px rgba(0,0,0,1), inset 0 0 20px rgba(255,105,180,0.05);
            overflow: hidden;
        }
        canvas { display: block; }
        video { display: none; }
        /* HUD hiển thị thông tin */
        .hud {
            position: absolute; top: 20px; left: 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
            pointer-events: none;
        }
        #status {
            position: absolute; bottom: 30px; width: 100%;
            text-align: center; color: #ff69b4;
            font-weight: bold; text-shadow: 0 0 10px rgba(255,105,180,0.5);
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="frame">
            <div class="hud">System: Active<br>Particles: 2000<br>Mode: Gesture Sensing</div>
            <canvas id="canvas"></canvas>
            <div id="status">INITIALIZING SYSTEM...</div>
        </div>
    </div>
    <video id="input_video"></video>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const frame = document.getElementById('frame');
        const statusText = document.getElementById('status');

        canvas.width = frame.clientWidth;
        canvas.height = frame.clientHeight;

        const particles = [];
        const particleCount = 2000; // Tăng số lượng cho "nặng" máy nè anh
        
        // --- TẠO HÌNH MẪU CHỮ V (✌️) ---
        const vPoints = [];
        function createVPattern() {
            vPoints.length = 0;
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            // Vẽ 2 nét của chữ V
            for(let i=0; i<particleCount; i++) {
                let px, py;
                if (i < particleCount / 2) {
                    // Nét trái
                    px = centerX - 60 + (i / (particleCount/2)) * 60;
                    py = centerY + 100 - (i / (particleCount/2)) * 200;
                } else {
                    // Nét phải
                    let j = i - particleCount/2;
                    px = centerX + (j / (particleCount/2)) * 60;
                    py = centerY - 100 + (j / (particleCount/2)) * 200;
                }
                vPoints.push({x: px, y: py});
            }
        }
        createVPattern();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.destX = this.x;
                this.destY = this.y;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.acc = 0.15;
                this.friction = 0.95;
                this.size = Math.random() * 1.5 + 0.5;
                this.color = "white";
            }

            update(mode, targetPoint) {
                if (mode === 'pattern') {
                    // Bay về vị trí mẫu với hiệu ứng Easing
                    let dx = targetPoint.x - this.x;
                    let dy = targetPoint.y - this.y;
                    this.vx += dx * this.acc;
                    this.vy += dy * this.acc;
                    this.vx *= this.friction;
                    this.vy *= this.friction;
                } else {
                    // Bay tự do
                    this.vx += (Math.random() - 0.5) * 0.2;
                    this.vy += (Math.random() - 0.5) * 0.2;
                    this.vx *= 0.99;
                    this.vy *= 0.99;
                    
                    // Chạm tường bật lại
                    if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                    if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
                }
                this.x += this.vx;
                this.y += this.vy;
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < particleCount; i++) {
            particles.push(new Particle());
        }

        let currentMode = 'free';

        function onResults(results) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            let handDetected = results.multiHandLandmarks && results.multiHandLandmarks.length > 0;
            
            if (handDetected) {
                const landmarks = results.multiHandLandmarks[0];
                // Check cử chỉ ✌️: Ngón trỏ (8) và Ngón giữa (12) đưa lên cao hơn các ngón khác
                const isPeace = landmarks[8].y < landmarks[6].y && landmarks[12].y < landmarks[10].y && landmarks[16].y > landmarks[14].y;
                
                if (isPeace) {
                    currentMode = 'pattern';
                    statusText.innerText = "G-SENSOR: PEACE SIGN DETECTED ✌️";
                } else {
                    currentMode = 'free';
                    statusText.innerText = "SYSTEM: SCANNING FOR GESTURES...";
                }
            } else {
                currentMode = 'free';
                statusText.innerText = "SYSTEM: WAITING FOR INPUT...";
            }

            particles.forEach((p, i) => {
                p.update(currentMode, vPoints[i]);
                p.draw();
            });
        }

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.6 });
        hands.onResults(onResults);

        const camera = new Camera(document.getElementById('input_video'), {
            onFrame: async () => { await hands.send({image: document.getElementById('input_video')}); },
            width: 640, height: 480
        });
        camera.start();

        window.addEventListener('resize', () => {
            canvas.width = frame.clientWidth;
            canvas.height = frame.clientHeight;
            createVPattern();
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAvnhub FINAL STABLE</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<style>
body{margin:0;background:#000;overflow:hidden}
#top{height:45%;position:relative}
#bot{height:55%;position:relative}
video,canvas{position:absolute;width:100%;height:100%;object-fit:cover}
video{transform:scaleX(-1);opacity:.4}
</style>
</head>

<body>

<div id="top">
<video id="cam" playsinline></video>
<canvas id="c1"></canvas>
</div>

<div id="bot">
<canvas id="c2"></canvas>
</div>

<script>
const COUNT = 850;
const RADIUS = 15;

const video = document.getElementById("cam");
const c1 = document.getElementById("c1");
const c2 = document.getElementById("c2");
const ctx2 = c2.getContext("2d");

let W,H;

const STATE = {
    x:0,
    y:0,
    mode:"free",
    timer:0,
    step:0,
    touch:false
};

let particles=[];

// ===== RESIZE =====
function resize(){
    W = c2.width = c1.width = innerWidth;
    H = c2.height = innerHeight*0.55;
    c1.height = innerHeight*0.45;

    // set vị trí mặc định ở giữa (FIX MÀN ĐEN)
    STATE.x = W/2;
    STATE.y = H/2;
}
resize();
window.onresize = resize;

// ===== INIT =====
for(let i=0;i<COUNT;i++){
    particles.push({
        x:Math.random()*W,
        y:Math.random()*H,
        vx:0,vy:0
    });
}

// ===== COLOR =====
function color(speed){
    let t=Math.min(speed*10,1);
    return `hsl(${260+t*120},100%,60%)`;
}

// ===== TOUCH =====
function updateTouch(x,y){
    const rect = c2.getBoundingClientRect();
    STATE.x = x;
    STATE.y = y - rect.top;
}

addEventListener("touchmove",e=>{
    STATE.touch=true;
    updateTouch(e.touches[0].clientX, e.touches[0].clientY);
});

addEventListener("mousemove",e=>{
    STATE.touch=true;
    updateTouch(e.clientX, e.clientY);
});

addEventListener("touchend",()=>STATE.touch=false);
addEventListener("mouseup",()=>STATE.touch=false);

// ===== LOOP =====
function loop(){
    ctx2.fillStyle="rgba(0,0,0,0.15)";
    ctx2.fillRect(0,0,W,H);

    for(let p of particles){

        let dx=STATE.x-p.x;
        let dy=STATE.y-p.y;
        let dist=Math.hypot(dx,dy)||1;

        if(STATE.mode==="vortex"){
            let f=Math.min(120/dist,6);
            let ax=dx/dist, ay=dy/dist;

            let sx=-ay*1.3;
            let sy=ax*1.3;

            if(dist>RADIUS){
                p.vx+=ax*f*0.6+sx*f*0.4;
                p.vy+=ay*f*0.6+sy*f*0.4;
            }else{
                p.vx-=ax;
                p.vy-=ay;
            }

            p.vx*=0.92;
            p.vy*=0.92;
        }

        else if(STATE.mode==="fire"){
            if(STATE.step===1){
                p.vx+=(STATE.x-p.x)*0.2;
                p.vy+=(STATE.y-p.y)*0.2;
                p.vx*=0.85;p.vy*=0.85;
            }
            else if(STATE.step===2){
                p.vy-=8;
            }
            else{
                p.vx+=(Math.random()-0.5)*14;
                p.vy+=(Math.random()-0.5)*14;
            }
        }

        else{
            p.vx+=(Math.random()-0.5)*0.3;
            p.vy+=(Math.random()-0.5)*0.3;
            p.vx*=0.98;p.vy*=0.98;
        }

        p.x+=p.vx;
        p.y+=p.vy;

        if(p.x<0||p.x>W) p.vx*=-0.7;
        if(p.y<0||p.y>H) p.vy*=-0.7;

        let sp=Math.hypot(p.vx,p.vy);

        ctx2.fillStyle=color(sp);

        // fake comet trail
        ctx2.globalAlpha=0.3;
        ctx2.fillRect(p.x-p.vx*2,p.y-p.vy*2,2,2);

        ctx2.globalAlpha=0.6;
        ctx2.fillRect(p.x-p.vx,p.y-p.vy,2,2);

        ctx2.globalAlpha=1;
        ctx2.fillRect(p.x,p.y,2,2);
    }

    requestAnimationFrame(loop);
}

// ===== MEDIAPIPE =====
const hands=new Hands({
    locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
});
hands.setOptions({maxNumHands:1});

hands.onResults(r=>{
    if(r.multiHandLandmarks?.[0] && !STATE.touch){
        let h=r.multiHandLandmarks[0];

        STATE.x=(1-h[9].x)*W;
        STATE.y=h[9].y*H;

        let up=[
            h[4].y<h[3].y,
            h[8].y<h[6].y,
            h[12].y<h[10].y,
            h[16].y<h[14].y,
            h[20].y<h[18].y
        ];

        if(up[0]&&up[4]&&!up[1]) STATE.mode="vortex";
        else if(up[0]&&!up[1]) STATE.mode="fire";
        else STATE.mode="free";
    }
});

// ===== CAMERA =====
const cam=new Camera(video,{
    onFrame:async ()=>{
       hands.send({image:video});
    },
    width:640,height:480
});

cam.start();
video.onloadeddata = () => video.play();
ctx2.fillStyle="red";
ctx2.fillRect(0,0,20,20);
// START LOOP
loop();
</script>

</body>
    </html>
